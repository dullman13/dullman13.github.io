<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GG</title>
    <!-- No meta description, no og tags, no indexing -->
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Special+Elite&family=Permanent+Marker&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double:wght@100..900&display=swap" rel="stylesheet">

    <style>
        :root {
            --yellow: #f5e642;
            --red: #e8242a;
            --black: #0d0d0d;
            --off-white: #f0ece0;
            --grease: #1a1508;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            background-color: var(--black);
            color: var(--off-white);
            font-family: 'Special Elite', monospace;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
            opacity: 0.4;
        }

        /* === HEADER === */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.2rem 2.5rem;
            border-bottom: 3px solid var(--yellow);
            background: var(--black);
        }

        header h1 {
            font-family: 'Bitcount Grid Double', sans-serif;
            font-size: clamp(2rem, 5vw, 3.2rem);
            letter-spacing: 0.08em;
            color: var(--yellow);
            text-shadow: 3px 3px 0 var(--red), 6px 6px 0 rgba(0,0,0,0.4);
        }

        .header-tag {
            font-family: 'Permanent Marker', cursive;
            font-size: 0.85rem;
            color: rgba(240, 236, 224, 0.3);
            letter-spacing: 0.15em;
        }

        /* === MAIN === */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: clamp(2rem, 5vw, 4rem) clamp(1.5rem, 6vw, 5rem);
            gap: 2rem;
        }

        .page-label {
            font-family: 'Permanent Marker', cursive;
            font-size: 0.9rem;
            color: var(--red);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            animation: slideIn 0.5s ease both;
        }

        .page-title {
            font-family: 'Bitcount Grid Double', monospace;
            font-size: clamp(2.5rem, 7vw, 5rem);
            color: var(--off-white);
            line-height: 0.95;
            text-align: center;
            animation: slideIn 0.6s ease 0.1s both;
        }

        .page-title span { color: var(--yellow); }

        /* === VIDEO === */
        .video-wrapper {
            width: 100%;
            max-width: 900px;
            border: 2px solid rgba(245, 230, 66, 0.2);
            background: #000;
            position: relative;
            animation: slideIn 0.7s ease 0.2s both;
        }

        .video-wrapper::before {
            content: 'CLASSIFIED';
            position: absolute;
            top: -0.65em;
            left: 1.5rem;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 0.3em;
            background: var(--black);
            padding: 0 0.5rem;
            color: var(--red);
        }

        video {
            width: 100%;
            display: block;
        }

        /* === CONTENT AREA (for future additions) === */
        .content-area {
            width: 100%;
            max-width: 900px;
            animation: slideIn 0.7s ease 0.3s both;
        }

        /* === FOOTER === */
        footer {
            padding: 1.5rem clamp(1.5rem, 6vw, 5rem);
            border-top: 1px solid rgba(245, 230, 66, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--grease);
        }

        footer p {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 0.2em;
            color: rgba(240, 236, 224, 0.2);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(22px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--black); }
        ::-webkit-scrollbar-thumb { background: var(--yellow); }
    </style>
</head>
<body>

    <header>
        <h1>Glizzy Gang</h1>
        <span class="header-tag">&#9679; RESTRICTED ACCESS</span>
    </header>

    <main>
        <p class="page-label">&#9679; Eyes Only &#9679;</p>
        <h2 class="page-title">You <span>Found It</span></h2>

        <div class="video-wrapper">
            <!-- Replace video.mp4 with your actual filename -->
            <video controls preload="metadata">
                <source src="assets/video/video.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

        <!-- Add more content below this line as needed -->
        <div class="content-area">

        </div>

    </main>

    <footer>
        <p>&copy; 2026 Glizzy Gang &mdash; You didn't see shit</p>
    </footer>

</body>
</html>
