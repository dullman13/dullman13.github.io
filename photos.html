<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photos — Glizzy Gang</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Special+Elite&family=Permanent+Marker&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double:wght@100..900&family=Bitcount+Prop+Double:wght@100..900&display=swap" rel="stylesheet">

    <style>
        :root {
            --yellow: #f5e642;
            --red: #e8242a;
            --black: #0d0d0d;
            --off-white: #f0ece0;
            --grease: #1a1508;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html { scroll-behavior: smooth; }

        body {
            background-color: var(--black);
            color: var(--off-white);
            font-family: 'Special Elite', monospace;
            overflow-x: hidden;
            cursor: crosshair;
        }

        /* === GRAIN === */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
            opacity: 0.4;
        }

        /* === HEADER === */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.2rem 2.5rem;
            border-bottom: 3px solid var(--yellow);
            background: var(--black);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2rem, 5vw, 3.2rem);
            letter-spacing: 0.08em;
            color: var(--yellow);
            text-shadow: 3px 3px 0 var(--red), 6px 6px 0 rgba(0,0,0,0.4);
            animation: flicker 6s infinite;
            text-decoration: none;
        }

        @keyframes flicker {
            0%, 95%, 100% { opacity: 1; }
            96% { opacity: 0.7; }
            97% { opacity: 1; }
            98% { opacity: 0.5; }
            99% { opacity: 1; }
        }

        nav {
            display: flex;
            gap: 2rem;
        }

        nav a {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3rem;
            letter-spacing: 0.12em;
            color: var(--off-white);
            text-decoration: none;
            position: relative;
            transition: color 0.2s;
        }

        nav a.active {
            color: var(--yellow);
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--red);
            transition: width 0.25s ease;
        }

        nav a.active::after,
        nav a:hover::after {
            width: 100%;
        }

        nav a:hover { color: var(--yellow); }

        /* === PAGE HEADER === */
        .page-header {
            padding: clamp(3rem, 6vw, 5rem) clamp(1.5rem, 6vw, 5rem) 2rem;
            position: relative;
            overflow: hidden;
        }

        .page-header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                -55deg,
                transparent,
                transparent 40px,
                rgba(245, 230, 66, 0.028) 40px,
                rgba(245, 230, 66, 0.028) 42px
            );
            pointer-events: none;
        }

        .page-header::after {
            content: 'GG';
            position: absolute;
            right: -0.05em;
            bottom: -0.2em;
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(10rem, 22vw, 20rem);
            color: rgba(245, 230, 66, 0.04);
            line-height: 1;
            pointer-events: none;
            user-select: none;
        }

        .page-tag {
            font-family: 'Permanent Marker', cursive;
            font-size: clamp(0.8rem, 2vw, 1rem);
            color: var(--red);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 1rem;
            animation: slideIn 0.6s ease both;
        }

        .page-header h2 {
            font-family: 'Bitcount Grid Double', monospace;
            font-size: clamp(3rem, 9vw, 7rem);
            line-height: 0.92;
            color: var(--off-white);
            animation: slideIn 0.7s ease 0.1s both;
        }

        .page-header h2 span {
            color: var(--yellow);
        }

        /* === DIVIDER === */
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0 clamp(1.5rem, 6vw, 5rem);
            margin: 1.5rem 0;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--yellow), transparent);
        }

        .divider-icon {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            color: var(--red);
            letter-spacing: 0.2em;
        }

        /* === PHOTO GRID === */
        .gallery {
            padding: 2rem clamp(1.5rem, 6vw, 5rem) 5rem;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1rem;
        }

        .photo-item {
            position: relative;
            overflow: hidden;
            cursor: pointer;
            background: rgba(245, 230, 66, 0.04);
            border: 1px solid rgba(245, 230, 66, 0.1);
            aspect-ratio: 1 / 1;
            animation: slideIn 0.5s ease both;
        }

        .photo-item:nth-child(2) { animation-delay: 0.05s; }
        .photo-item:nth-child(3) { animation-delay: 0.10s; }
        .photo-item:nth-child(4) { animation-delay: 0.15s; }
        .photo-item:nth-child(5) { animation-delay: 0.20s; }
        .photo-item:nth-child(6) { animation-delay: 0.25s; }
        .photo-item:nth-child(7) { animation-delay: 0.30s; }
        .photo-item:nth-child(8) { animation-delay: 0.35s; }
        .photo-item:nth-child(9) { animation-delay: 0.40s; }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.35s ease, filter 0.35s ease;
            filter: grayscale(15%);
        }

        .photo-item:hover img {
            transform: scale(1.05);
            filter: grayscale(0%);
        }

        .photo-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(13,13,13,0.7) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: flex-end;
            padding: 1rem;
        }

        .photo-item:hover .photo-overlay {
            opacity: 1;
        }

        .photo-expand {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 0.2em;
            color: var(--yellow);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .photo-expand::before {
            content: '⤢';
            font-size: 1rem;
        }

        /* === LIGHTBOX === */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(13, 13, 13, 0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
            animation: fadeIn 0.2s ease both;
        }

        .lightbox.open {
            display: flex;
        }

        .lightbox img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            border: 2px solid rgba(245, 230, 66, 0.2);
            box-shadow: 0 0 80px rgba(0,0,0,0.8);
            animation: zoomIn 0.25s ease both;
        }

        .lightbox-close {
            position: absolute;
            top: 1.5rem;
            right: 2rem;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            color: var(--yellow);
            cursor: pointer;
            letter-spacing: 0.1em;
            line-height: 1;
            transition: color 0.15s;
        }

        .lightbox-close:hover { color: var(--red); }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.5rem;
            color: rgba(245, 230, 66, 0.5);
            cursor: pointer;
            padding: 1rem;
            transition: color 0.15s;
            user-select: none;
        }

        .lightbox-nav:hover { color: var(--yellow); }
        .lightbox-prev { left: 1rem; }
        .lightbox-next { right: 1rem; }

        /* === EMPTY STATE === */
        .empty-state {
            text-align: center;
            padding: 5rem 2rem;
            color: rgba(240, 236, 224, 0.3);
        }

        .empty-state .empty-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            display: block;
        }

        .empty-state p {
            font-family: 'Permanent Marker', cursive;
            font-size: 1.1rem;
            line-height: 1.8;
        }

        /* === FOOTER === */
        footer {
            margin-top: 4rem;
            padding: 2rem clamp(1.5rem, 6vw, 5rem);
            border-top: 3px solid var(--yellow);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            background: var(--grease);
        }

        footer p {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1rem;
            letter-spacing: 0.15em;
            color: rgba(240, 236, 224, 0.45);
        }

        .email-btn {
            display: inline-block;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.15rem;
            letter-spacing: 0.15em;
            padding: 0.6rem 1.8rem;
            background: transparent;
            color: var(--yellow);
            text-decoration: none;
            border: 2px solid var(--yellow);
            transition: all 0.18s ease;
            clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
        }

        .email-btn:hover {
            background: var(--yellow);
            color: var(--black);
        }

        /* === ANIMATIONS === */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(22px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.92); }
            to   { opacity: 1; transform: scale(1); }
        }

        /* === SCROLLBAR === */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--black); }
        ::-webkit-scrollbar-thumb { background: var(--yellow); }
    </style>
</head>
<body>

    <header>
        <a href="index.html" style="text-decoration:none;">
            <h1>Glizzy Gang</h1>
        </a>
        <nav>
            <a href="index.html#about">About</a>
            <a href="photos.html" class="active">Photos</a>
            <a href="index.html#contact">Contact</a>
        </nav>
    </header>

    <div class="page-header">
        <p class="page-tag">&#9679; The Archives &nbsp;&#9679;&nbsp; Documented Evidence</p>
        <h2>Photo <span>Roll</span></h2>
    </div>

    <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-icon">&#9830; GG &#9830;</span>
        <div class="divider-line"></div>
    </div>

    <main class="gallery">
        <div class="photo-grid" id="photoGrid">

            <!-- 
                TO ADD PHOTOS: copy one of the blocks below and update the src path.
                Images should live in assets/images/
                Example: <img src="assets/images/yourphoto.jpg" alt="description">
            -->

            <div class="photo-item" onclick="openLightbox(0)">
                <img src="assets/images/photo1.jpg" alt="Photo 1">
                <div class="photo-overlay"><span class="photo-expand">View</span></div>
            </div>

            <div class="photo-item" onclick="openLightbox(1)">
                <img src="assets/images/photo2.jpg" alt="Photo 2">
                <div class="photo-overlay"><span class="photo-expand">View</span></div>
            </div>

            <div class="photo-item" onclick="openLightbox(2)">
                <img src="assets/images/photo3.jpg" alt="Photo 3">
                <div class="photo-overlay"><span class="photo-expand">View</span></div>
            </div>

            <div class="photo-item" onclick="openLightbox(3)">
                <img src="assets/images/photo4.jpg" alt="Photo 4">
                <div class="photo-overlay"><span class="photo-expand">View</span></div>
            </div>

            <div class="photo-item" onclick="openLightbox(4)">
                <img src="assets/images/photo5.jpg" alt="Photo 5">
                <div class="photo-overlay"><span class="photo-expand">View</span></div>
            </div>

            <div class="photo-item" onclick="openLightbox(5)">
                <img src="assets/images/photo6.jpg" alt="Photo 6">
                <div class="photo-overlay"><span class="photo-expand">View</span></div>
            </div>

        </div>
    </main>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
        <span class="lightbox-close" onclick="closeLightbox()">✕ CLOSE</span>
        <span class="lightbox-nav lightbox-prev" onclick="navigate(-1); event.stopPropagation();">&#8592;</span>
        <img id="lightboxImg" src="" alt="">
        <span class="lightbox-nav lightbox-next" onclick="navigate(1); event.stopPropagation();">&#8594;</span>
    </div>

    <footer id="contact">
        <p>&copy; 2026 Glizzy Gang. All Rights Reserved or Whatever.</p>
        <p><a href="mailto:info@glizzygang.club" class="email-btn">Get Glizzy</a></p>
    </footer>

    <script>
        let currentIndex = 0;

        function getImages() {
            return Array.from(document.querySelectorAll('.photo-item img'));
        }

        function openLightbox(index) {
            const imgs = getImages();
            currentIndex = index;
            document.getElementById('lightboxImg').src = imgs[index].src;
            document.getElementById('lightboxImg').alt = imgs[index].alt;
            document.getElementById('lightbox').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox(e) {
            if (e && e.target !== document.getElementById('lightbox') && !e.target.classList.contains('lightbox-close')) return;
            document.getElementById('lightbox').classList.remove('open');
            document.body.style.overflow = '';
        }

        function navigate(dir) {
            const imgs = getImages();
            currentIndex = (currentIndex + dir + imgs.length) % imgs.length;
            const lb = document.getElementById('lightboxImg');
            lb.style.animation = 'none';
            lb.offsetHeight; // reflow to restart animation
            lb.style.animation = '';
            lb.src = imgs[currentIndex].src;
            lb.alt = imgs[currentIndex].alt;
        }

        // Keyboard nav
        document.addEventListener('keydown', e => {
            if (!document.getElementById('lightbox').classList.contains('open')) return;
            if (e.key === 'ArrowRight') navigate(1);
            if (e.key === 'ArrowLeft') navigate(-1);
            if (e.key === 'Escape') {
                document.getElementById('lightbox').classList.remove('open');
                document.body.style.overflow = '';
            }
        });
    </script>

</body>
</html>
