<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expat Checklist — Glizzy Gang</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Special+Elite&family=Permanent+Marker&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double:wght@100..900&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            min-height: 100vh;
            background: #1a1814;
            color: #e8e0d4;
            font-family: 'Special Elite', Georgia, serif;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
            opacity: 0.3;
        }

        /* === STICKY HEADER === */
        .top-header {
            background: linear-gradient(135deg, #2a2520 0%, #1a1814 100%);
            border-bottom: 1px solid #3a3530;
            padding: 40px 32px 32px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .site-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .site-nav a {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(1.6rem, 4vw, 2.4rem);
            letter-spacing: 0.08em;
            color: #f5e642;
            text-decoration: none;
            text-shadow: 2px 2px 0 #e8242a;
        }

        .site-nav span {
            font-family: 'Permanent Marker', cursive;
            font-size: 0.85rem;
            color: rgba(232, 224, 212, 0.3);
            letter-spacing: 0.15em;
        }

        .header-title {
            font-family: 'Bitcount Grid Double', monospace;
            font-size: clamp(2rem, 6vw, 3.5rem);
            color: #e8e0d4;
            line-height: 0.95;
            margin-bottom: 20px;
        }

        .header-title span { color: #c8a96e; }

        /* Progress bar */
        .progress-row {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .progress-bar-track {
            flex: 1;
            height: 6px;
            background: #2e2a26;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #c8a96e, #81b29a);
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .progress-label {
            font-family: monospace;
            font-size: 13px;
            color: #8a8070;
            white-space: nowrap;
        }

        .progress-pct {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            color: #c8a96e;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }

        /* Filter buttons */
        .filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 5px 14px;
            border-radius: 20px;
            font-family: 'Special Elite', serif;
            font-size: 12px;
            cursor: pointer;
            letter-spacing: 0.05em;
            text-transform: capitalize;
            transition: all 0.15s;
            border: 1px solid #3a3530;
            background: transparent;
            color: #8a8070;
        }

        .filter-btn.active {
            border-color: #c8a96e;
            background: rgba(200,169,110,0.15);
            color: #c8a96e;
        }

        /* === SECTIONS === */
        .sections {
            max-width: 760px;
            margin: 0 auto;
            padding: 24px 32px 80px;
        }

        .section {
            margin-bottom: 12px;
        }

        .section-header {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: #22201c;
            border: 1px solid #2e2a26;
            border-radius: 6px 6px 0 0;
            cursor: pointer;
            color: #e8e0d4;
            text-align: left;
            transition: background 0.15s;
        }

        .section-header.collapsed {
            border-radius: 6px;
        }

        .section-header:hover { background: #272420; }

        .section-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title {
            font-family: 'Special Elite', serif;
            font-size: 15px;
            font-weight: normal;
            letter-spacing: 0.03em;
        }

        .section-count {
            font-family: monospace;
            font-size: 11px;
            color: #8a8070;
        }

        .section-count.complete { color: #81b29a; }

        .section-arrow {
            color: #8a8070;
            font-size: 14px;
        }

        /* Items */
        .section-items {
            border: 1px solid #2e2a26;
            border-top: none;
            border-radius: 0 0 6px 6px;
            overflow: hidden;
        }

        .section-items.hidden { display: none; }

        .item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 13px 20px;
            border-bottom: 1px solid #2a2620;
            cursor: pointer;
            transition: background 0.1s;
        }

        .item:last-child { border-bottom: none; }
        .item:hover { background: rgba(200,169,110,0.05) !important; }
        .item.even { background: #1e1c18; }
        .item.odd { background: #211f1b; }
        .item.done { background: rgba(129,178,154,0.04) !important; }

        .checkbox {
            width: 18px;
            height: 18px;
            border-radius: 3px;
            border: 2px solid #3a3530;
            background: transparent;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }

        .checkbox.checked {
            border-color: #81b29a;
            background: #81b29a;
        }

        .checkbox.checked::after {
            content: '✓';
            color: #1a1814;
            font-size: 11px;
            font-weight: bold;
        }

        .item-text {
            font-family: 'Special Elite', serif;
            font-size: 14px;
            color: #c8c0b0;
            flex: 1;
            line-height: 1.4;
            transition: color 0.15s;
        }

        .item-text.done {
            color: #5a5650;
            text-decoration: line-through;
        }

        .priority-badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            flex-shrink: 0;
            font-family: monospace;
        }

        /* === LEGEND === */
        .legend {
            margin-top: 32px;
            padding: 16px 20px;
            background: #22201c;
            border-radius: 6px;
            border: 1px solid #2e2a26;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .legend-label {
            font-size: 11px;
            color: #8a8070;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-family: monospace;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .legend-item span {
            font-size: 12px;
            color: #8a8070;
            font-family: 'Special Elite', serif;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1a1814; }
        ::-webkit-scrollbar-thumb { background: #c8a96e; }
    </style>
</head>
<body>

<div class="top-header">
    <div class="site-nav">
        <a href="index.html">Glizzy Gang</a>
        <span>&#9679; EXPAT CHECKLIST</span>
    </div>
    <h1 class="header-title">Expat <span>Checklist</span></h1>
    <div class="progress-row">
        <div class="progress-bar-track">
            <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
        </div>
        <span class="progress-label" id="progressLabel">0 / 0 complete</span>
        <span class="progress-pct" id="progressPct">0%</span>
    </div>
    <div class="filters" id="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="remaining">Remaining</button>
        <button class="filter-btn" data-filter="critical">Critical</button>
        <button class="filter-btn" data-filter="high">High</button>
        <button class="filter-btn" data-filter="medium">Medium</button>
        <button class="filter-btn" data-filter="low">Low</button>
    </div>
</div>

<div class="sections" id="sections"></div>

<script>
const sections = [
  { id: "documents", title: "Documents & Identity", color: "#c8a96e", items: [
    { id: "d1", text: "Renew passport (18+ months validity remaining)", priority: "critical" },
    { id: "d2", text: "Get apostilled birth certificate", priority: "critical" },
    { id: "d3", text: "Get apostilled marriage certificate (if applicable)", priority: "critical" },
    { id: "d4", text: "Get apostilled FBI background check (via U.S. Dept. of State)", priority: "critical" },
    { id: "d5", text: "Get apostilled diplomas / transcripts", priority: "high" },
    { id: "d6", text: "Obtain International Driving Permit (AAA issues these)", priority: "high" },
    { id: "d7", text: "Scan and store digital copies of all documents securely (cloud + USB)", priority: "high" },
    { id: "d8", text: "Research target country's visa / residency pathway and start application", priority: "critical" },
    { id: "d9", text: "Update will and power of attorney with foreign address in mind", priority: "high" },
    { id: "d10", text: "Designate a trusted U.S. agent with power of attorney for stateside matters", priority: "medium" },
  ]},
  { id: "tax", title: "Tax & Financial Compliance", color: "#e07a5f", items: [
    { id: "t1", text: "Hire a U.S. expat tax specialist (not a general CPA)", priority: "critical" },
    { id: "t2", text: "Understand your FEIE eligibility (Form 2555) — ~$126K exclusion", priority: "critical" },
    { id: "t3", text: "Understand FBAR requirements (FinCEN 114) — file if foreign accounts exceed $10K", priority: "critical" },
    { id: "t4", text: "Understand FATCA requirements (Form 8938)", priority: "critical" },
    { id: "t5", text: "File all back U.S. tax returns before departure", priority: "critical" },
    { id: "t6", text: "Notify IRS of foreign address change (Form 8822)", priority: "high" },
    { id: "t7", text: "Research target country's tax treaty with the U.S.", priority: "high" },
    { id: "t8", text: "Research exit tax implications if considering renunciation", priority: "medium" },
    { id: "t9", text: "Understand Social Security rules for collecting abroad", priority: "medium" },
    { id: "t10", text: "Understand capital gains exclusion rules if selling U.S. home", priority: "high" },
  ]},
  { id: "banking", title: "Banking & Money", color: "#81b29a", items: [
    { id: "b1", text: "Open a Charles Schwab brokerage checking account (fee-free global ATM)", priority: "critical" },
    { id: "b2", text: "Open a Wise or Revolut account for international transfers", priority: "high" },
    { id: "b3", text: "Establish a U.S. address (mail service or trusted contact) for all banking", priority: "critical" },
    { id: "b4", text: "Notify current banks of international move — some will close accounts", priority: "high" },
    { id: "b5", text: "Pay off or consolidate U.S. debts before departure", priority: "high" },
    { id: "b6", text: "Research how to receive income / pension / retirement distributions abroad", priority: "high" },
    { id: "b7", text: "Set up autopay for any recurring U.S. obligations (storage, taxes, etc.)", priority: "medium" },
    { id: "b8", text: "Build 6–12 months of liquid emergency reserves before leaving", priority: "critical" },
  ]},
  { id: "healthcare", title: "Healthcare", color: "#6d9eeb", items: [
    { id: "h1", text: "Full physical exam before departure — address anything pending", priority: "critical" },
    { id: "h2", text: "Full dental exam and any needed work", priority: "critical" },
    { id: "h3", text: "Eye exam; stock up on contacts / get prescription", priority: "high" },
    { id: "h4", text: "Obtain 90+ day supplies of all prescriptions", priority: "critical" },
    { id: "h5", text: "Verify all medications are legal in destination country", priority: "critical" },
    { id: "h6", text: "Get vaccination records in certified portable format", priority: "high" },
    { id: "h7", text: "Research international health insurance (Cigna Global, Aetna Intl, SafetyWing)", priority: "critical" },
    { id: "h8", text: "Understand Medicare situation — generally does NOT cover abroad", priority: "high" },
    { id: "h9", text: "Research local healthcare quality and costs at destination", priority: "medium" },
  ]},
  { id: "property", title: "Property & Possessions", color: "#b07d62", items: [
    { id: "p1", text: "Decide: sell, rent, or hold U.S. property", priority: "critical" },
    { id: "p2", text: "If renting: understand landlord tax obligations and hire a property manager", priority: "high" },
    { id: "p3", text: "If selling: time the sale to maximize capital gains exclusion", priority: "high" },
    { id: "p4", text: "Research property ownership rules in destination country (foreigners may have restrictions)", priority: "critical" },
    { id: "p5", text: "Downsize aggressively — international shipping is expensive", priority: "high" },
    { id: "p6", text: "Get international shipping quotes if bringing significant belongings", priority: "medium" },
    { id: "p7", text: "Research customs duties on goods imported to destination country", priority: "medium" },
    { id: "p8", text: "Rent before buying abroad — get the lay of the land first", priority: "high" },
  ]},
  { id: "pets", title: "Pets & Animals", color: "#a8c5a0", items: [
    { id: "a1", text: "Research destination country's pet import requirements in detail", priority: "critical" },
    { id: "a2", text: "Ensure all pets are microchipped (ISO 11784/11785 standard)", priority: "critical" },
    { id: "a3", text: "Get all required vaccinations (rabies is almost always required)", priority: "critical" },
    { id: "a4", text: "Obtain USDA-endorsed health certificates for each animal", priority: "critical" },
    { id: "a5", text: "Research parasite treatment requirements (tapeworm, etc.)", priority: "high" },
    { id: "a6", text: "Research quarantine requirements — some countries require it", priority: "critical" },
    { id: "a7", text: "Check airline pet policies — large dogs often must fly cargo", priority: "high" },
    { id: "a8", text: "Research pet-friendly housing availability at destination", priority: "high" },
    { id: "a9", text: "Find a vet at destination before arrival", priority: "medium" },
  ]},
  { id: "logistics", title: "Logistics & Admin", color: "#9b7bb8", items: [
    { id: "l1", text: "Set up a U.S. virtual mailbox (Traveling Mailbox, Anytime Mailbox)", priority: "critical" },
    { id: "l2", text: "Register with U.S. Embassy via the STEP program (free, takes 10 min)", priority: "high" },
    { id: "l3", text: "Unlock your phone; research international SIM or eSIM options", priority: "high" },
    { id: "l4", text: "Research VPN needs — some streaming / banking requires U.S. IP", priority: "medium" },
    { id: "l5", text: "Update beneficiaries on all accounts, insurance, and retirement plans", priority: "high" },
    { id: "l6", text: "Cancel or transfer U.S. subscriptions and services", priority: "medium" },
    { id: "l7", text: "Notify SSA of address change if receiving benefits", priority: "high" },
    { id: "l8", text: "Research driving requirements — local license, IDP validity period", priority: "medium" },
    { id: "l9", text: "Research language requirements at destination and begin study if needed", priority: "medium" },
    { id: "l10", text: "Join expat communities online for destination-specific intel (Facebook groups, Reddit)", priority: "low" },
  ]},
];

const priorityConfig = {
  critical: { label: "Critical", color: "#e07a5f", bg: "rgba(224,122,95,0.15)" },
  high:     { label: "High",     color: "#c8a96e", bg: "rgba(200,169,110,0.15)" },
  medium:   { label: "Medium",   color: "#81b29a", bg: "rgba(129,178,154,0.15)" },
  low:      { label: "Low",      color: "#9b7bb8", bg: "rgba(155,123,184,0.15)" },
};

// State
let checked = JSON.parse(localStorage.getItem('gg-checklist') || '{}');
let openSections = Object.fromEntries(sections.map(s => [s.id, true]));
let currentFilter = 'all';

function save() {
  localStorage.setItem('gg-checklist', JSON.stringify(checked));
}

function allItems() {
  return sections.flatMap(s => s.items);
}

function updateProgress() {
  const all = allItems();
  const done = all.filter(i => checked[i.id]).length;
  const pct = all.length ? Math.round((done / all.length) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = done + ' / ' + all.length + ' complete';
  document.getElementById('progressPct').textContent = pct + '%';
}

function getFilteredItems(section) {
  return section.items.filter(i => {
    if (currentFilter === 'all') return true;
    if (currentFilter === 'remaining') return !checked[i.id];
    return i.priority === currentFilter;
  });
}

function renderSections() {
  const container = document.getElementById('sections');
  container.innerHTML = '';

  sections.forEach(section => {
    const items = getFilteredItems(section);
    if (!items.length) return;

    const sectionChecked = section.items.filter(i => checked[i.id]).length;
    const isOpen = openSections[section.id];

    const div = document.createElement('div');
    div.className = 'section';

    // Header
    const hdr = document.createElement('button');
    hdr.className = 'section-header' + (isOpen ? '' : ' collapsed');
    hdr.style.borderLeft = `3px solid ${section.color}`;
    hdr.innerHTML = `
      <div class="section-header-left">
        <span class="section-title">${section.title}</span>
        <span class="section-count ${sectionChecked === section.items.length ? 'complete' : ''}">${sectionChecked}/${section.items.length}</span>
      </div>
      <span class="section-arrow">${isOpen ? '▲' : '▼'}</span>
    `;
    hdr.addEventListener('click', () => {
      openSections[section.id] = !openSections[section.id];
      renderSections();
    });

    // Items list
    const list = document.createElement('div');
    list.className = 'section-items' + (isOpen ? '' : ' hidden');

    items.forEach((item, idx) => {
      const isDone = !!checked[item.id];
      const pc = priorityConfig[item.priority];

      const row = document.createElement('div');
      row.className = 'item ' + (isDone ? 'done' : (idx % 2 === 0 ? 'even' : 'odd'));

      row.innerHTML = `
        <div class="checkbox ${isDone ? 'checked' : ''}"></div>
        <span class="item-text ${isDone ? 'done' : ''}">${item.text}</span>
        <span class="priority-badge" style="color:${pc.color};background:${pc.bg};border:1px solid ${pc.color}40">${pc.label}</span>
      `;

      row.addEventListener('click', () => {
        checked[item.id] = !checked[item.id];
        save();
        updateProgress();
        renderSections();
      });

      list.appendChild(row);
    });

    div.appendChild(hdr);
    div.appendChild(list);
    container.appendChild(div);
  });

  // Legend
  const legend = document.createElement('div');
  legend.className = 'legend';
  legend.innerHTML = '<span class="legend-label">Priority:</span>' +
    Object.entries(priorityConfig).map(([key, val]) =>
      `<div class="legend-item"><div class="legend-dot" style="background:${val.color}"></div><span>${val.label}</span></div>`
    ).join('');
  container.appendChild(legend);
}

// Filter buttons
document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  currentFilter = btn.dataset.filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderSections();
});

// Init
updateProgress();
renderSections();
</script>

</body>
</html>
